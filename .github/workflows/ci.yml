name: CI

# Hosted runners fail instantly while the GitHub account has a billing lock:
#   "The job was not started because your account is locked due to a billing issue."
# Until billing is cleared (https://github.com/settings/billing), keep this
# workflow_dispatch-only so pushes do not spam red CI notifications.
# After unlock: restore the push/pull_request triggers below and
#   gh api -X PUT repos/OWNER/REPO/actions/permissions --input - <<< '{"enabled":true}'
#   gh workflow enable CI

on:
  workflow_dispatch:

  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Embedded secret scan
        run: python tools/scan_embedded_secrets.py

      - name: Syntax check
        run: python -m compileall -q .
